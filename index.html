<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hollow Realm Arsenal & Inventory</title>
  <style>
    body { background: #0a081e; color: #fff; font-family: Arial, sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; }
    
    /* Arsenal & Tabs */
    .tab-btn { padding: 8px 14px; border-radius: 20px; cursor: pointer; border: 1px solid #333; background: transparent; color: #aaa; white-space: nowrap; }
    .tab-btn.active { border-color: #8a5adc; background: rgba(138,90,220,0.15); color: #d1b3ff; font-weight: bold; }
    .item-card { background: #1a1a24; border: 1px solid #333; border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
    .item-details { display: none; padding: 0 14px 14px; }
    .item-card.open .item-details { display: block; }
    .item-card.open { box-shadow: 0 0 18px rgba(138,90,220,0.2); border-color: #8a5adc; }
    .rarity-badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    
    /* Inventory & Character Sheet */
    .equip-slot { background: #0a081e; border: 1px dashed #555; border-radius: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
    .equip-slot.filled { border-style: solid; border-color: #66bb6a; }
    .inv-item { background: #222230; border: 1px solid #444; border-radius: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .action-btn { background: #333; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; transition: background 0.2s; }
    .action-btn:hover { background: #555; }
    .equip-btn { background: rgba(102, 187, 106, 0.2); border: 1px solid #66bb6a; color: #66bb6a; }
    .equip-btn:hover { background: rgba(102, 187, 106, 0.4); }
    .drop-btn { background: rgba(239, 83, 80, 0.2); border: 1px solid #ef5350; color: #ef5350; }
    .drop-btn:hover { background: rgba(239, 83, 80, 0.4); }
    .take-btn { margin-top:8px; width:100%; padding:8px; font-size: 0.8rem; }
  </style>
</head>
<body>

  <div id="arsenal-nav" style="display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 5px;">
    <button class="tab-btn active" data-target="weapons">⚔️ Weapons</button>
    <button class="tab-btn" data-target="armor">🛡 Armor</button>
    <button class="tab-btn" data-target="enchantments">✨ Enchantments</button>
    <button class="tab-btn" data-target="chests">📦 Chests</button>
    <button class="tab-btn" data-target="lootbins">🎲 Loot Bins</button>
  </div>

  <div id="arsenal-content"></div>

  <div id="character-sheet" style="background: #13131c; border: 1px solid #4fc3f7; border-radius: 10px; padding: 15px; margin-top: 30px;">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px;">
      <h3 style="color: #4fc3f7; margin: 0;">Character Sheet</h3>
      <input type="text" id="char-name" placeholder="Character Name" onchange="saveCharData()" style="background: #0a081e; color: #fff; border: 1px solid #333; padding: 5px 10px; border-radius: 5px; font-weight: bold; width: 150px;">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
      <div style="background: #0a081e; padding: 12px; border-radius: 8px; border: 1px solid #222;">
        <div style="font-size: 0.65rem; color: #888; text-transform: uppercase; margin-bottom: 8px;">Combat Stats</div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
          <span style="color: #ccc; font-size: 0.85rem;">Total Defense:</span>
          <span id="stat-def" style="color: #66bb6a; font-weight: bold; font-size: 0.9rem;">0 DEF</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
          <span style="color: #ccc; font-size: 0.85rem;">Attack Damage:</span>
          <span id="stat-dmg" style="color: #ef5350; font-weight: bold; font-size: 0.9rem;">Unarmed (1d2)</span>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px dashed #333;">
          <span style="color: #ccc; font-size: 0.85rem;">Current HP:</span>
          <div style="display: flex; gap: 5px; align-items: center;">
            <input type="number" id="char-hp" value="20" onchange="saveCharData()" style="background: transparent; color: #fff; border: none; border-bottom: 1px solid #555; width: 40px; text-align: center; font-weight: bold;">
            <span style="color: #555;">/ <span id="max-hp">20</span></span>
          </div>
        </div>
      </div>

      <div style="background: #0a081e; padding: 12px; border-radius: 8px; border: 1px solid #222;">
        <div style="font-size: 0.65rem; color: #ffd54f; text-transform: uppercase; margin-bottom: 8px;">Active Passives & Effects</div>
        <ul id="active-effects-list" style="margin: 0; padding-left: 15px; color: #ddd; font-size: 0.75rem; line-height: 1.5; display: flex; flex-direction: column; gap: 6px;">
          <li style="color: #555; font-style: italic; list-style: none; margin-left: -15px;">No active effects. Equip gear to gain passives.</li>
        </ul>
      </div>
    </div>
  </div>

  <div id="inventory-container" style="display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap;">
    <div style="flex: 1; min-width: 250px; background: #13131c; border: 1px solid #333; border-radius: 10px; padding: 15px;">
      <h3 style="color: #66bb6a; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 8px;">Equipped Gear</h3>
      <div id="equipped-slots" style="display: flex; flex-direction: column; gap: 10px;"></div>
    </div>

    <div style="flex: 2; min-width: 300px; background: #1a1a24; border: 1px solid #333; border-radius: 10px; padding: 15px;">
      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 10px;">
        <h3 style="color: #d1b3ff; margin: 0;">Backpack</h3>
        <span id="gold-display" style="color: #ffd54f; font-weight: bold; font-size: 0.9rem;">🪙 0 Gold</span>
      </div>
      <div id="backpack-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
    </div>
  </div>

  { name: "Collapsed Barracks Pile", type: "Debris Loot", location: "Crumbling Kingdom — anywhere soldiers were stationed", roll: "d20 roll to search", note: "The rubble has been searched before. Not everything was found.", image: "🏚️", color: "#ffd54f", loot: [ { item: "Garrison weapon (random tier)", chance: "40%", roll: "1–8" }, { item: "Coin pouch (d6 × 10)", chance: "35%", roll: "13–16" }, { item: "Trap — something left intentionally", chance: "10%", roll: "6" } ] },

// ── STATE MANAGEMENT ───────────────────────────────────────
let inventory = JSON.parse(localStorage.getItem('hollow_inventory')) || [];
let equipped = JSON.parse(localStorage.getItem('hollow_equipped')) || { Weapon: null, Armor: null, Accessory: null };
let playerGold = parseInt(localStorage.getItem('hollow_gold')) || 0;
let charData = JSON.parse(localStorage.getItem('hollow_char_data')) || { name: "", hp: 20 };

function saveInventory() {
  localStorage.setItem('hollow_inventory', JSON.stringify(inventory));
  localStorage.setItem('hollow_equipped', JSON.stringify(equipped));
  localStorage.setItem('hollow_gold', playerGold);
  renderInventoryUI();
}

function saveCharData() {
  charData.name = document.getElementById('char-name').value;
  charData.hp = document.getElementById('char-hp').value;
  localStorage.setItem('hollow_char_data', JSON.stringify(charData));
}

function addToInventory(item) {
  const newItem = JSON.parse(JSON.stringify(item));
  newItem.id = Date.now() + Math.random(); 
  inventory.push(newItem);
  saveInventory();
}

function equipItem(itemId, slotType) {
  const itemIndex = inventory.findIndex(i => i.id === itemId);
  if (itemIndex === -1) return;
  const itemToEquip = inventory[itemIndex];
  if (equipped[slotType]) inventory.push(equipped[slotType]);
  equipped[slotType] = itemToEquip;
  inventory.splice(itemIndex, 1);
  saveInventory();
}

function unequipItem(slotType) {
  if (!equipped[slotType]) return;
  inventory.push(equipped[slotType]);
  equipped[slotType] = null;
  saveInventory();
}

function dropItem(itemId) {
  inventory = inventory.filter(i => i.id !== itemId);
  saveInventory();
}

// ── RENDERERS ──────────────────────────────────────────────
const contentDiv = document.getElementById('arsenal-content');

function renderWeapons() {
  let html = ``;
  for (const [className, weapons] of Object.entries(WEAPON_DATA)) {
    html += `<h3 style="color:#d1b3ff; margin-top: 20px; border-bottom: 1px solid #333; padding-bottom: 5px;">${className}</h3>`;
    weapons.forEach((wpn) => {
      // Stringify carefully to pass object inline
      const wpnJson = JSON.stringify(wpn).replace(/"/g, '&quot;');
      html += `
        <div class="item-card" onclick="this.classList.toggle('open')">
          <div style="padding: 12px; display:flex; justify-content:space-between;">
            <div style="display:flex; gap:10px;">
              <span style="font-size:1.5rem;">${wpn.image}</span>
              <div>
                <div style="font-weight:bold; color:${wpn.color};">${wpn.name}</div>
                <div style="font-size:0.7rem; color:#888;">${wpn.type}</div>
              </div>
            </div>
            <span class="rarity-badge" style="background:${wpn.bg}; color:${wpn.color}; border: 1px solid ${wpn.color}">${wpn.rarity}</span>
          </div>
          <div class="item-details" onclick="event.stopPropagation()">
            <hr style="border-color:#333;">
            <p style="font-size:0.8rem; color:#fff;"><strong>Damage:</strong> ${wpn.damage}</p>
            <p style="font-size:0.8rem; color:#ddd;"><strong>Effect:</strong> ${wpn.effect}</p>
            <p style="font-size:0.75rem; color:#aaa; font-style:italic; background: #222; padding: 8px; border-radius: 5px;">"${wpn.lore}"</p>
            <button class="action-btn equip-btn take-btn" onclick="addToInventory(${wpnJson})">Take Item 🎒</button>
          </div>
        </div>`;
    });
  }
  contentDiv.innerHTML = html;
}

    html += `<h3 style="color:#d1b3ff; margin-top: 20px; border-bottom: 1px solid #333; padding-bottom: 5px;">${className} Armor</h3>`;
    armors.forEach(armor => {
      const armJson = JSON.stringify(armor).replace(/"/g, '&quot;');
      html += `
        <div class="item-card" onclick="this.classList.toggle('open')">
          <div style="padding: 12px; display:flex; justify-content:space-between;">
            <div style="display:flex; gap:10px;">
              <span style="font-size:1.5rem;">${armor.image}</span>
              <div>
                <div style="font-weight:bold; color:${armor.color};">${armor.name}</div>
                <div style="font-size:0.7rem; color:#888;">${armor.slot}</div>
              </div>
            </div>
            <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
              <span class="rarity-badge" style="background:${armor.bg}; color:${armor.color}; border: 1px solid ${armor.color}">${armor.rarity}</span>
              <span style="font-size:0.7rem; color:#66bb6a; font-weight:bold;">${armor.defense}</span>
            </div>
          </div>
          <div class="item-details" onclick="event.stopPropagation()">

            <p style="font-size:0.75rem; color:#aaa;"><strong>Found At:</strong> ${armor.location}</p>
            <p style="font-size:0.75rem; color:#aaa; font-style:italic; background: #222; padding: 8px; border-radius: 5px;">"${armor.lore}"</p>
            <button class="action-btn equip-btn take-btn" onclick="addToInventory(${armJson})">Take Item 🎒</button>
          </div>
        </div>`;
    });
  }
  contentDiv.innerHTML = html;
}

function renderChests() {
  let html = `<h3 style="color:#d1b3ff; margin-top: 20px; border-bottom: 1px solid #333; padding-bottom: 5px;">Chests & Containers</h3>`;
  CHEST_DATA.forEach(chest => {
    let lootHtml = chest.loot.map(l => `
      <div style="display:flex; justify-content:space-between; border-bottom: 1px solid #333; padding: 6px 0;">
        <span style="font-size:0.75rem; color:#ccc;">${l.item}</span>
        <span style="font-size:0.75rem; font-weight:bold; color:${chest.color || '#4fc3f7'};">${l.chance}</span>
      </div>`).join('');
    html += `
      <div class="item-card" onclick="this.classList.toggle('open')">
        <div style="padding: 12px; display:flex; justify-content:space-between; align-items:flex-start;">
          <div style="display:flex; gap:10px; align-items:center;">
            <span style="font-size:1.8rem;">${chest.image}</span>
            <div>
              <div style="font-weight:bold; color:#fff;">${chest.name}</div>
              <div style="font-size:0.65rem; color:${chest.color || '#4fc3f7'}; text-transform:uppercase; letter-spacing:1px;">${chest.type}</div>
            </div>
          </div>
          <div style="font-size:0.65rem; color:#888; text-align:right;">📍 ${chest.spawnChance}</div>

        <div class="item-details">

          <div style="margin-top: 12px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; border: 1px solid #222;">
            <div style="font-size:0.65rem; color:${chest.color || '#4fc3f7'}; text-transform:uppercase; margin-bottom: 4px; letter-spacing: 1px;">Loot Table</div>

          <div style="margin-top: 12px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; border: 1px solid #222;">
            <div style="font-size:0.65rem; color:${bin.color}; text-transform:uppercase; margin-bottom: 4px; letter-spacing: 1px;">Loot Table</div>

function updateCharacterSheet() {
  document.getElementById('char-name').value = charData.name;
  document.getElementById('char-hp').value = charData.hp;

  let totalDef = 0; 
  let currentDmg = "Unarmed (1d2)";
  let activeEffects = [];

  if (equipped.Armor && equipped.Armor.defense) {
    const defMatch = equipped.Armor.defense.match(/\+(\d+)/); 
    if (defMatch) totalDef += parseInt(defMatch[1]);
    if (equipped.Armor.effect && equipped.Armor.effect !== "None.") activeEffects.push(`🛡 <strong>${equipped.Armor.name}:</strong> ${equipped.Armor.effect}`);
  }

  if (equipped.Weapon) {
    currentDmg = equipped.Weapon.damage || currentDmg;
    if (equipped.Weapon.effect && equipped.Weapon.effect !== "None.") activeEffects.push(`⚔️ <strong>${equipped.Weapon.name}:</strong> ${equipped.Weapon.effect}`);
  }

  if (equipped.Accessory && equipped.Accessory.effect) {
    activeEffects.push(`✨ <strong>${equipped.Accessory.name}:</strong> ${equipped.Accessory.effect}`);
  }

  document.getElementById('stat-def').innerText = `+${totalDef} DEF`;
  document.getElementById('stat-dmg').innerText = currentDmg;

  const effectsList = document.getElementById('active-effects-list');
  if (activeEffects.length > 0) {
    effectsList.innerHTML = activeEffects.map(eff => `<li>${eff}</li>`).join('');
  } else {
    effectsList.innerHTML = `<li style="color: #555; font-style: italic; list-style: none; margin-left: -15px;">No active effects. Equip gear to gain passives.</li>`;
  }
}

function renderInventoryUI() {
  document.getElementById('gold-display').innerText = `🪙 ${playerGold} Gold`;

  const slotsDiv = document.getElementById('equipped-slots');
  slotsDiv.innerHTML = '';
  ['Weapon', 'Armor', 'Accessory'].forEach(slot => {
    const item = equipped[slot];
    if (item) {
      slotsDiv.innerHTML += `
        <div class="equip-slot filled">
          <div style="display:flex; gap:10px; align-items:center;">
            <span style="font-size:1.5rem;">${item.image || '❓'}</span>
            <div>
              <div style="font-size:0.6rem; color:#888; text-transform:uppercase;">${slot}</div>
              <div style="font-weight:bold; font-size:0.8rem; color:${item.color || '#fff'};">${item.name}</div>
            </div>
          </div>
          <button class="action-btn" onclick="unequipItem('${slot}')">Unequip</button>
        </div>`;
    } else {
      slotsDiv.innerHTML += `<div class="equip-slot"><div style="font-size:0.7rem; color:#555; text-transform:uppercase;">Empty ${slot}</div></div>`;
    }
  });

  const backpackDiv = document.getElementById('backpack-list');
  backpackDiv.innerHTML = '';
  if (inventory.length === 0) {
    backpackDiv.innerHTML = `<div style="color:#555; font-size:0.8rem; font-style:italic; padding:10px;">Backpack is empty.</div>`;
  } else {
    inventory.forEach(item => {
      let equipSlot = 'Accessory'; 
      if (item.type && (item.type.includes('Slashing') || item.type.includes('Piercing') || item.type.includes('Blunt') || item.type.includes('Focus') || item.type.includes('Instrument'))) equipSlot = 'Weapon';
      if (item.slot && (item.slot.includes('Chest') || item.slot.includes('Armor') || item.slot.includes('Robes'))) equipSlot = 'Armor';

      backpackDiv.innerHTML += `
        <div class="inv-item">
          <div style="display:flex; gap:10px; align-items:center;">
            <span style="font-size:1.2rem;">${item.image || '📦'}</span>
            <div>
              <div style="font-weight:bold; font-size:0.8rem; color:${item.color || '#fff'};">${item.name}</div>
              <div style="font-size:0.6rem; color:#aaa;">${item.damage || item.defense || item.effect || 'Standard Item'}</div>
            </div>
          </div>
          <div style="display:flex; gap:5px;">
            <button class="action-btn equip-btn" onclick="equipItem(${item.id}, '${equipSlot}')">Equip</button>
            <button class="action-btn drop-btn" onclick="dropItem(${item.id})">Drop</button>
          </div>
        </div>`;
    });
  }
  updateCharacterSheet();
}

// ── INIT & EVENT LISTENERS ─────────────────────────────────
const tabs = document.querySelectorAll('.tab-btn');
tabs.forEach(tab => {
  tab.addEventListener('click', (e) => {
    tabs.forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    const target = e.target.getAttribute('data-target');
    if (target === 'weapons') renderWeapons();
    else if (target === 'armor') renderArmor();
    else if (target === 'enchantments') renderEnchantments();
    else if (target === 'chests') renderChests();
    else if (target === 'lootbins') renderLootBins();
  });
});

// Startup
renderWeapons();
renderInventoryUI();
</script>

</html>
